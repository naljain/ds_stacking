deploy:
  config: configs/default.yaml

  # Checkpoint selection
  ckpt_arm: per_arm

  # Neural DS inference
  use_safe: true
  ds_scale: 1.0
  max_steps: 30000
  done_tol: 0.05
  joint_done_tol: 0.05

  # Physical manipulation only:
  # - false means do not attach cubes to the gripper in software
  # - false means do not snap cubes to the stack target after opening
  kinematic_carry: false

  # Do not skip failed primitives by moving to the next phase.
  advance_on_timeout: false

  # Physical pickup path:
  # - reach is a deterministic pre-pick hover directly over the cube
  # - grasp then descends vertically from that pre-pick pose
  # - transport remains the learned neural DS
  ik_primitives: reach,grasp,lift,place
  ik_goal_gain: 3.0
  grasp_z_offset: 0.0
  gripper_steps: 120

  # Start with no modulation while debugging physical grasp behavior.
  no_modulation: true
  no_link_safety_hold: true

  # Keep finished arms where they end; this avoids a post-task parking motion
  # from bumping the stack while physical grasp/place is being debugged.
  no_return_home_after_done: true

  # Visibility/runtime
  headless: false
  debug_ik: false

  # Optional offscreen recording. Set video=true for the default path, or set
  # gif_out explicitly.
  video: false
  video_dir: data/results
  gif_out: ""
  gif_fps: 20
  gif_stride: 4
  gif_size: 640x480
