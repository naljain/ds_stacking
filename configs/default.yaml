# Default config for dual-arm DS stacking project

# ── Scene geometry (metres) ────────────────────────────────────────────────────
table:
  height: 0.74
  width:  1.20      # long side along X
  depth:  0.70      # short side along Y
  thick:  0.05
  centre: [0.0, 0.45, 0.0]

block:
  size: 0.05
  mass: 0.05

arms:
  spacing: 0.60     # distance between left and right arm base in X
  y:       0.0      # Y position of arm bases
  face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

# Optional local asset override. Isaac Sim's Franka helper otherwise resolves
# the robot USD through the configured Isaac assets root.
assets:
  franka_usd: null

# ── Initial block layout ───────────────────────────────────────────────────────
left_blocks:
  - {name: block_red,    pos: [-0.40,  0.30, 0.765], color: [1.0, 0.1, 0.1]}
  - {name: block_orange, pos: [-0.40,  0.50, 0.765], color: [1.0, 0.5, 0.0]}
  - {name: block_pink,   pos: [-0.25,  0.40, 0.765], color: [1.0, 0.4, 0.7]}

right_blocks:
  - {name: block_blue,   pos: [0.40,  0.30, 0.765], color: [0.1, 0.3, 1.0]}
  - {name: block_green,  pos: [0.40,  0.50, 0.765], color: [0.1, 0.8, 0.1]}
  - {name: block_yellow, pos: [0.25,  0.40, 0.765], color: [1.0, 0.85, 0.0]}

goals:
  left:  [0.0, 0.65]   # single shared stack — both arms transport to centre
  right: [0.0, 0.65]

# ── Motion primitive heights ──────────────────────────────────────────────────
heights:
  hover:  0.89    # table_height + 0.15 — pre-grasp hover
  grasp:  0.77    # table_height + 0.03 — fingertips at mid-block
  lift:   1.10    # carries block at this height; clears 6-block stack (top ~1.04m)

# ── Simulation ────────────────────────────────────────────────────────────────
sim:
  physics_dt:    0.00833    # 1/120
  rendering_dt:  0.01667    # 1/60
  steps_per_primitive:
    reach:     60
    grasp:     50
    lift:      50
    transport: 80
    place:     50
  gripper_steps: 30

# ── Neural DS training ────────────────────────────────────────────────────────
training:
  state_dim:        7        # e = q - q_goal — error-based DS input
  velocity_dim:     7        # joint velocity output
  hidden_dim:       128
  lyapunov_hidden:  64
  alpha:            1.0      # Lyapunov decay rate
  lambda_stab:      0.05     # weight on stability loss (skip connection + f(0)=0 handle the rest)
  lr:               1.0e-3
  batch_size:       256
  epochs:           1000
  device:           cuda
  max_joint_vel:    2.0      # rad/s clamp applied at deployment (per joint)

# ── Coordination ──────────────────────────────────────────────────────────────
coordination:
  ee_safety_radius:    0.15    # arms back off if EE distance < this
  hold_threshold:      0.20    # wait if other arm is closer than this to my goal
  collision_check_hz:  60
  start_stagger_steps: 30      # initial right-arm delay (~0.25s at 120 Hz)

# ── Perturbations ─────────────────────────────────────────────────────────────
perturbations:
  block_displacement:
    enabled: true
    max_offset: 0.05    # max XY shift in metres
  ee_disturbance:
    enabled: true
    max_force: 5.0      # Newtons
    duration: 0.2       # seconds
  arm_block:
    enabled: true
    freeze_duration: 1.0    # seconds

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  demos:       data/demonstrations
  checkpoints: data/checkpoints
  results:     data/results
