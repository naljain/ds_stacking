# Default config for dual-arm DS stacking project

# ── Scene geometry (metres) ────────────────────────────────────────────────────
table:
  height: 0.74
  width:  1.20      # long side along X
  depth:  0.70      # short side along Y
  thick:  0.05
  centre: [0.0, 0.45, 0.0]

block:
  size: 0.05
  mass: 0.05

stack:
  clearance_above_top: 0.12

# arms:
#   spacing: 0.60     # distance between left and right arm base in X
#   y:       0.0      # Y position of arm bases
#   face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

arms:
  spacing: 0.60     # distance between left and right arm base in X
  y:       0.0      # Y position of arm bases
  face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

  # Default joint poses in radians (raw values).
  # Left arm: exact values from reference pose.
  # Right arm: j0 and j1 mirrored (sign flipped); j2-j6 kept the same
  #            until confirmed by testing.
  #   j0       j1       j2        j3       j4      j5      j6
  default_joints_left:  [ 1.93,  1.10, -1.8639, -2.6820,  1.0833,  1.9480, -0.1237]
  default_joints_right: [-1.93, 1.10, 1.8639, -2.6820,  -1.0833,  1.9480, 0.1237]

# ── Initial block layout ───────────────────────────────────────────────────────
left_blocks:
  - {name: block_red,    pos: [-0.40,  0.30, 0.765], color: [1.0, 0.1, 0.1]}
  - {name: block_orange, pos: [-0.40,  0.50, 0.765], color: [1.0, 0.5, 0.0]}
  - {name: block_pink,   pos: [-0.25,  0.40, 0.765], color: [1.0, 0.4, 0.7]}

right_blocks:
  - {name: block_blue,   pos: [0.40,  0.30, 0.765], color: [0.1, 0.3, 1.0]}
  - {name: block_green,  pos: [0.40,  0.50, 0.765], color: [0.1, 0.8, 0.1]}
  - {name: block_yellow, pos: [0.25,  0.40, 0.765], color: [1.0, 0.85, 0.0]}

goals:
  left:  [0.0, 0.65]   # single shared stack — both arms transport to centre
  right: [0.0, 0.65]

# ── Motion primitive heights ──────────────────────────────────────────────────
heights:
  hover:  0.95    # table_height + 0.21 — pre-grasp hover
  grasp:  0.77    # table_height + 0.03 — fingertips at mid-block
  lift:   0.99    # table_height + 0.25 — transport altitude

# ── Simulation ────────────────────────────────────────────────────────────────
sim:
  physics_dt:    0.00833    # 1/120
  rendering_dt:  0.01667    # 1/60
  steps_per_primitive:
    reach:     120
    grasp:     60
    lift:      80
    transport: 150
    place:     80
  gripper_steps: 30
  inter_primitive_pause_steps: 120

# ── Neural DS training ────────────────────────────────────────────────────────
training:
  state_dim:        7        # e = q - q_goal — error-based DS input
  velocity_dim:     7        # joint velocity output
  hidden_dim:       128
  lyapunov_hidden:  64
  alpha:            1.0      # Lyapunov decay rate
  lambda_stab:      0.05     # light Lyapunov regularizer; do not let it dominate imitation
  stable_skip_gain: 1.0      # convergent linear prior baked into the architecture
                             # (f(e) = residual(e) - gain * e). 0 means pure NN
                             # residual, which trains poorly when demos are noisy.
  lr:               1.0e-3
  batch_size:       256
  epochs:           1000
  device:           cuda
  max_joint_vel:    1.5      # rad/s clamp applied at deployment (per joint)

# ── Coordination ──────────────────────────────────────────────────────────────
coordination:
  ee_safety_radius:    0.15    # arms back off if EE distance < this
  hold_threshold:      0.20    # wait if other arm is closer than this to my goal
  collision_check_hz:  60
  start_stagger_steps: 2400    # 20.0 s at 120 Hz; right arm starts after left

# ── Perturbations ─────────────────────────────────────────────────────────────
perturbations:
  block_displacement:
    enabled: true
    max_offset: 0.05    # max XY shift in metres
  ee_disturbance:
    enabled: true
    max_force: 5.0      # Newtons
    duration: 0.2       # seconds
  arm_block:
    enabled: true
    freeze_duration: 1.0    # seconds

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  demos:       data/demonstrations
  checkpoints: data/checkpoints
  results:     data/results
