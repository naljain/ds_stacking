# Default config for dual-arm DS stacking project

# ── Scene geometry (metres) ────────────────────────────────────────────────────
table:
  height: 0.74
  width:  1.20      # long side along X
  depth:  0.70      # short side along Y
  thick:  0.05
  centre: [0.0, 0.45, 0.0]

block:
  size: 0.045
  mass: 0.05
  static_friction: 2.0
  dynamic_friction: 1.5
  restitution: 0.0
  # World-frame XY correction applied to reach/grasp targets. This mirrors
  # the working stephen/testing calibration hook for the controlled Lula
  # gripper frame vs. the visual cube center.
  grasp_xy_offset:
    left:  [0.0, 0.0]
    right: [0.0, 0.0]

gripper:
  # Physical pickup needs friction on the finger collision meshes too, not just
  # on the cube. Off by default because the stock Franka contact is able to
  # pick cubes and late material binding can perturb Isaac's referenced USD.
  high_friction_fingers: false
  static_friction: 2.5
  dynamic_friction: 2.0
  restitution: 0.0

stack:
  clearance_above_top: 0.12

# arms:
#   spacing: 0.60     # distance between left and right arm base in X
#   y:       0.0      # Y position of arm bases
#   face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

arms:
  spacing: 0.60     # distance between left and right arm base in X
  y:       0.0      # Y position of arm bases
  face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

  # Default joint poses in radians: explicit copy of the Isaac Franka startup
  # posture used before d933725, when the demos/checkpoints were collected.
  # Keep both arms identical in their local joint coordinates.
  #   j0       j1       j2       j3       j4      j5      j6
  default_joints_left:  [0.0, -0.785398, 0.0, -2.356194, 0.0, 1.570796, 0.785398]
  default_joints_right: [0.0, -0.785398, 0.0, -2.356194, 0.0, 1.570796, 0.785398]

# ── Initial block layout ───────────────────────────────────────────────────────
left_blocks:
  - {name: block_red,    pos: [-0.40,  0.30, 0.7625], color: [1.0, 0.1, 0.1]}
  - {name: block_orange, pos: [-0.40,  0.50, 0.7625], color: [1.0, 0.5, 0.0]}
  - {name: block_pink,   pos: [-0.25,  0.40, 0.7625], color: [1.0, 0.4, 0.7]}

right_blocks:
  - {name: block_blue,   pos: [0.40,  0.30, 0.7625], color: [0.1, 0.3, 1.0]}
  - {name: block_green,  pos: [0.40,  0.50, 0.7625], color: [0.1, 0.8, 0.1]}
  - {name: block_yellow, pos: [0.25,  0.40, 0.7625], color: [1.0, 0.85, 0.0]}

goals:
  left:  [0.0, 0.65]   # single shared stack — both arms transport to centre
  right: [0.0, 0.65]

# ── Motion primitive heights ──────────────────────────────────────────────────
heights:
  hover:  0.89    # table_height + 0.15 — pre-pick hover from stephen/testing
  grasp:  0.75    # table_height + 0.01 — matches working stephen/testing grasp
  lift:   0.99    # table_height + 0.25 — transport altitude

# ── Simulation ────────────────────────────────────────────────────────────────
sim:
  physics_dt:    0.00833    # 1/120
  rendering_dt:  0.01667    # 1/60
  camera:
    # Front-of-table view from stephen/testing: camera sits at +Y and looks
    # back toward the Franka bases, keeping the grippers and stack visible.
    eye:    [0.0, 2.25, 1.45]
    target: [0.0, 0.25, 0.80]
  steps_per_primitive:
    reach:     120
    grasp:     80
    lift:      80
    transport: 150
    place:     80
  gripper_steps: 30
  inter_primitive_pause_steps: 120

# ── Neural DS training ────────────────────────────────────────────────────────
training:
  state_dim:        7        # e = q - q_goal — error-based DS input
  velocity_dim:     7        # joint velocity output
  hidden_dim:       128
  lyapunov_hidden:  64
  alpha:            1.0      # Lyapunov decay rate
  lambda_stab:      0.05     # light Lyapunov regularizer; do not let it dominate imitation
  stable_skip_gain: 1.0      # convergent linear prior baked into the architecture
                             # (f(e) = residual(e) - gain * e). 0 means pure NN
                             # residual, which trains poorly when demos are noisy.
  lr:               1.0e-3
  batch_size:       256
  epochs:           300
  device:           cuda
  max_joint_vel:    1.5      # rad/s clamp applied at deployment (per joint)

# ── Coordination ──────────────────────────────────────────────────────────────
coordination:
  ee_safety_radius:    0.30    # spherical modulation radius around protected points
  modulation_reactivity: 2.0   # lower values make avoidance start earlier
  modulation_isoline:  1.0     # >1 expands the effective modulation boundary
  preserve_mod_speed:  true
  lateral_order_min_separation: 0.08  # keep protected left/right points ordered in X
  lateral_order_reactivity: 2.0
  lateral_order_mod_weight: 1.0
  lateral_order_lambda_floor: -0.75
  priority_policy:     fixed   # fixed or closest_to_stack
  priority_hysteresis: 0.04
  link_proxy_spheres:  3
  link_proxy_spacing:  0.055
  link_proxy_frames:   [panda_link5, panda_link6, panda_link7, right_gripper]
  link_proxy_samples_per_segment: 2
  gripper_proxy_lateral_offsets: [-0.065, 0.065]
  gripper_proxy_body_offsets: [0.075, 0.13, 0.185]
  hold_threshold:      0.30    # wait if other arm is closer than this to my goal
  collision_check_hz:  60
  start_stagger_steps: 0       # both arms start together by default
  yield_radius:        0.12    # place-yield radius around shared stack

# ── Perturbations ─────────────────────────────────────────────────────────────
perturbations:
  block_displacement:
    enabled: true
    max_offset: 0.05    # max XY shift in metres
  ee_disturbance:
    enabled: true
    max_force: 5.0      # Newtons
    duration: 0.2       # seconds
  arm_block:
    enabled: true
    freeze_duration: 1.0    # seconds

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  demos:       data/demonstrations
  checkpoints: data/checkpoints
  results:     data/results
