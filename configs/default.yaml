# Default config for dual-arm DS stacking project

# ── Scene geometry (metres) ────────────────────────────────────────────────────
table:
  height: 0.74
  width:  1.20      # long side along X
  depth:  0.70      # short side along Y
  thick:  0.05
  centre: [0.0, 0.45, 0.0]

block:
  size: 0.045
  mass: 0.05
  # World-frame XY correction applied to pick targets. Use this to calibrate
  # the controlled Lula gripper frame to the visual center of the cube.
  grasp_xy_offset:
    left:  [0.0, 0.0]
    right: [0.0, 0.0]

arms:
  spacing: 0.60     # distance between left and right arm base in X
  y:       0.0      # Y position of arm bases
  face_table_quat: [0.7071, 0.0, 0.0, 0.7071]   # 90° around Z

  # Default joint poses in radians. With both bases using the same table-facing
  # orientation, the visual side-by-side mirror keeps shoulder pitch j1, elbow
  # j3, and wrist pitch j5 the same while flipping the yaw/roll joints.
  #   j0       j1       j2        j3       j4      j5      j6
  default_joints_left:  [ 1.93,  1.10, -1.8639, -2.6820,  1.0833,  1.9480, -0.1237]
  default_joints_right: [-1.93,  1.10,  1.8639, -2.6820, -1.0833,  1.9480,  0.1237]

# ── Block layout ───────────────────────────────────────────────────────────────
# Fixed colors and names. Positions are randomised each demo within the
# workspace bounds defined below — only the spawn Z is fixed (table surface).
left_blocks:
  - {name: block_red,    color: [1.0, 0.1, 0.1]}
  - {name: block_orange, color: [1.0, 0.5, 0.0]}
  - {name: block_pink,   color: [1.0, 0.4, 0.7]}

right_blocks:
  - {name: block_blue,   color: [0.1, 0.3, 1.0]}
  - {name: block_green,  color: [0.1, 0.8, 0.1]}
  - {name: block_yellow, color: [1.0, 0.85, 0.0]}

# Per-arm workspace bounds for block randomisation [x_min, x_max, y_min, y_max].
# Blocks are picked from each arm's own side of the table; both arms then
# transport into the shared central stacking workspace.
# Z is always table_height + block_size/2.
block_workspace:
  front_y_min: 0.30       # keep random blocks sufficiently in front of bases
  left:  {x_min: -0.50, x_max: -0.15, y_min: 0.30, y_max: 0.60}
  right: {x_min:  0.15, x_max:  0.50, y_min: 0.30, y_max: 0.60}
  min_block_spacing: 0.08   # minimum distance between any two blocks (metres)

# Single shared stacking point near the centre of the table.
# Both arms transport their blocks here and build one unified stack.
shared_goal: [0.0, 0.45]

# ── Motion primitive heights ──────────────────────────────────────────────────
heights:
  hover:  0.89    # table_height + 0.15 — pre-grasp hover
  grasp:  0.75    # table_height + 0.01 — at block level
  lift:   0.99    # table_height + 0.25 — transport altitude

# ── Simulation ────────────────────────────────────────────────────────────────
sim:
  physics_dt:    0.00833    # 1/120
  rendering_dt:  0.01667    # 1/60
  camera:
    # Front-of-table view: camera sits at +Y and looks back toward the arms
    # at y=0, so the Frankas appear behind the tabletop on either side.
    eye:    [0.0, 2.25, 1.45]
    target: [0.0, 0.25, 0.80]
  steps_per_primitive:
    reach:     120
    grasp:     80
    lift:      80
    transport: 150
    place:     80
  gripper_steps: 30

# ── Neural DS training ────────────────────────────────────────────────────────
training:
  state_dim:        7        # q - q_goal joint-error DS input
  velocity_dim:     7        # joint velocity output
  hidden_dim:       128
  lyapunov_hidden:  64
  alpha:            1.0      # Lyapunov decay rate
  lambda_stab:      0.05     # light Lyapunov regularizer; do not let it dominate imitation
  stable_skip_gain: 1.0      # convergent linear prior: f(e) = residual(e) - gain * e
  lr:               1.0e-3
  batch_size:       256
  epochs:           1000
  device:           cuda
  max_joint_vel:    1.5      # rad/s clamp for training artifacts and deployment

# ── Coordination ──────────────────────────────────────────────────────────────
coordination:
  ee_safety_radius:    0.30    # spherical modulation radius around each EE
  modulation_reactivity: 2.0   # Γ=(d/R)^p; lower p makes avoidance start earlier
  modulation_isoline:  1.0     # Γ contour tracked by modulation; >1 expands effective boundary
  preserve_mod_speed:  true    # rescale modulated velocity to nominal speed
  priority_policy:     fixed   # fixed or closest_to_stack
  priority_hysteresis: 0.04    # metres before closest-to-stack priority switches
  link_proxy_spheres:  3       # extra wrist/last-link spheres behind the EE
  link_proxy_spacing:  0.055   # metres between EE and each proxy sphere
  link_proxy_frames:   [panda_link5, panda_link6, panda_link7, right_gripper]
  link_proxy_samples_per_segment: 2  # extra spheres between consecutive FK frames
  gripper_proxy_lateral_offsets: [-0.065, 0.065]  # cover left/right gripper-body width
  gripper_proxy_body_offsets: [0.075, 0.13, 0.185]  # stations up the gripper hand body
  hold_threshold:      0.30    # wait if other arm is closer than this to my goal
  collision_check_hz:  60
  yield_radius:        0.12    # arm waits to place if other EE is within this
                               # distance of the shared stack goal (XY only)

# ── Perturbations ─────────────────────────────────────────────────────────────
perturbations:
  block_displacement:
    enabled: true
    max_offset: 0.05    # max XY shift in metres
  ee_disturbance:
    enabled: true
    max_force: 5.0      # Newtons
    duration: 0.2       # seconds
  arm_block:
    enabled: true
    freeze_duration: 1.0    # seconds

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  demos:       data/demonstrations
  checkpoints: data/checkpoints
  results:     data/results
